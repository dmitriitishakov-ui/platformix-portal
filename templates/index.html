<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корпоративный портал</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: #f4f6f9; color: #2c3e50; }
  header { background: #1f5c99; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  nav a { color: #cfe3f5; text-decoration: none; margin-left: 24px; font-size: 14px; cursor: pointer; }
  nav a:hover, nav a.active { color: #fff; }
  .login-status { font-size: 13px; color: #cfe3f5; margin-left: 24px; }
  .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
  .search-box { display: flex; gap: 8px; margin-bottom: 24px; }
  .search-box input { flex: 1; padding: 12px 16px; border: 1px solid #d5dde5; border-radius: 8px; font-size: 15px; outline: none; }
  .search-box input:focus { border-color: #1f5c99; }
  .btn { padding: 12px 20px; background: #1f5c99; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .btn:hover { background: #174a7d; }
  .btn-secondary { background: #e8eef4; color: #1f5c99; }
  .btn-secondary:hover { background: #d8e4ef; }
  .doc-list { display: grid; gap: 12px; }
  .doc-item { background: #fff; border: 1px solid #e3e9ef; border-radius: 10px; padding: 16px 20px; cursor: pointer; transition: box-shadow 0.15s; }
  .doc-item:hover { box-shadow: 0 4px 14px rgba(31, 92, 153, 0.12); }
  .doc-item h3 { font-size: 16px; margin-bottom: 6px; }
  .doc-meta { font-size: 13px; color: #7f93a6; display: flex; gap: 16px; }
  .doc-category { display: inline-block; background: #e8f1fa; color: #1f5c99; font-size: 12px; padding: 2px 10px; border-radius: 20px; }
  .doc-card { background: #fff; border: 1px solid #e3e9ef; border-radius: 10px; padding: 28px 32px; }
  .doc-card h2 { font-size: 22px; margin-bottom: 12px; }
  .doc-card .doc-meta { margin-bottom: 20px; }
  .doc-card .content { line-height: 1.7; font-size: 15px; color: #44586c; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #1f5c99; cursor: pointer; font-size: 14px; }
  .back-link:hover { text-decoration: underline; }
  .form-grid { display: grid; gap: 14px; }
  .form-grid input, .form-grid textarea { width: 100%; padding: 12px 14px; border: 1px solid #d5dde5; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
  .form-grid input:focus, .form-grid textarea:focus { border-color: #1f5c99; }
  .form-grid textarea { min-height: 120px; resize: vertical; }
  .hidden { display: none; }
  .empty-state { text-align: center; color: #7f93a6; padding: 48px 0; font-size: 15px; }
  .hint { font-size: 13px; color: #7f93a6; margin-bottom: 8px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #2c3e50; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Корпоративный портал</h1>
  <nav>
    <a id="nav-docs" class="active">Документы</a>
    <a id="nav-create">Создать документ</a>
    <span class="login-status" id="login-status">Не авторизован</span>
  </nav>
</header>

<div class="container">

  <!-- Список -->
  <div id="view-list">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Поиск по документам...">
      <button class="btn" id="search-btn">Найти</button>
      <button class="btn btn-secondary" id="reset-btn">Сбросить</button>
    </div>
    <div class="doc-list" id="doc-list"></div>
    <div class="empty-state hidden" id="empty-state">Ничего не найдено</div>
  </div>

  <!-- Карточка -->
  <div id="view-card" class="hidden">
    <span class="back-link" id="back-link">&#8592; Назад к списку</span>
    <div class="doc-card" id="doc-card"></div>
  </div>

  <!-- Создание -->
  <div id="view-create" class="hidden">
    <div class="doc-card">
      <h2>Новый документ</h2>
      <p class="hint" id="create-hint"></p>
      <div class="form-grid" style="margin-top: 16px;">
        <input type="text" id="f-title" placeholder="Название документа">
        <input type="text" id="f-category" placeholder="Категория (например: Регламенты)">
        <input type="text" id="f-author" placeholder="Автор">
        <textarea id="f-content" placeholder="Текст документа"></textarea>
        <button class="btn" id="create-btn">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Вход -->
  <div id="view-login" class="hidden">
    <div class="doc-card" style="max-width: 400px;">
      <h2>Вход</h2>
      <p class="hint">Создание документов доступно после входа.<br>Тестовый вход: admin / admin123</p>
      <div class="form-grid" style="margin-top: 16px;">
        <input type="text" id="l-username" placeholder="Логин" value="admin">
        <input type="password" id="l-password" placeholder="Пароль" value="admin123">
        <button class="btn" id="login-btn">Войти</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Токен храним в памяти страницы (не в localStorage)
let authToken = null;

const views = {
  list:   document.getElementById('view-list'),
  card:   document.getElementById('view-card'),
  create: document.getElementById('view-create'),
  login:  document.getElementById('view-login'),
};

function showView(name) {
  Object.values(views).forEach(v => v.classList.add('hidden'));
  views[name].classList.remove('hidden');
  document.getElementById('nav-docs').classList.toggle('active', name === 'list');
  document.getElementById('nav-create').classList.toggle('active', name === 'create');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateLoginStatus() {
  const el = document.getElementById('login-status');
  el.textContent = authToken ? 'Вы вошли (admin)' : 'Не авторизован';
}

async function loadDocuments(query = '') {
  const url = query ? `/documents?q=${encodeURIComponent(query)}` : '/documents';
  const res = await fetch(url);
  const docs = await res.json();
  const list = document.getElementById('doc-list');
  const empty = document.getElementById('empty-state');
  list.innerHTML = '';
  if (docs.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  docs.forEach(doc => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.innerHTML = `
      <h3>${doc.title}</h3>
      <div class="doc-meta">
        <span class="doc-category">${doc.category}</span>
        <span>${doc.author}</span>
        <span>${doc.created_at}</span>
      </div>`;
    item.addEventListener('click', () => openDocument(doc.id));
    list.appendChild(item);
  });
}

async function openDocument(id) {
  const res = await fetch(`/documents/${id}`);
  if (!res.ok) { toast('Документ не найден'); return; }
  const doc = await res.json();
  document.getElementById('doc-card').innerHTML = `
    <h2>${doc.title}</h2>
    <div class="doc-meta">
      <span class="doc-category">${doc.category}</span>
      <span>${doc.author}</span>
      <span>${doc.created_at}</span>
    </div>
    <div class="content">${doc.content}</div>`;
  showView('card');
}

async function doLogin() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('l-username').value,
      password: document.getElementById('l-password').value,
    }),
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Ошибка входа'); return; }
  authToken = data.token;
  updateLoginStatus();
  toast('Вход выполнен');
  showView('create');
  document.getElementById('create-hint').textContent = '';
}

async function createDocument() {
  if (!authToken) {
    toast('Сначала войдите');
    showView('login');
    return;
  }
  const res = await fetch('/documents', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${authToken}`,
    },
    body: JSON.stringify({
      title:    document.getElementById('f-title').value,
      category: document.getElementById('f-category').value,
      author:   document.getElementById('f-author').value,
      content:  document.getElementById('f-content').value,
    }),
  });

  if (res.status === 401) {
    authToken = null;
    updateLoginStatus();
    toast('Сессия истекла, войдите заново');
    showView('login');
    return;
  }

  const data = await res.json();
  if (!res.ok) { toast(data.error || 'Ошибка'); return; }
  ['f-title','f-category','f-author','f-content'].forEach(id => document.getElementById(id).value = '');
  toast('Документ создан');
  showView('list');
  loadDocuments();
}

// Навигация
document.getElementById('nav-docs').addEventListener('click', () => { showView('list'); loadDocuments(); });
document.getElementById('nav-create').addEventListener('click', () => {
  if (!authToken) { showView('login'); } else { showView('create'); }
});
document.getElementById('back-link').addEventListener('click', () => showView('list'));
document.getElementById('search-btn').addEventListener('click', () => loadDocuments(document.getElementById('search-input').value));
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadDocuments(e.target.value); });
document.getElementById('reset-btn').addEventListener('click', () => { document.getElementById('search-input').value=''; loadDocuments(); });
document.getElementById('create-btn').addEventListener('click', createDocument);
document.getElementById('login-btn').addEventListener('click', doLogin);

loadDocuments();
updateLoginStatus();
</script>

</body>
</html>
